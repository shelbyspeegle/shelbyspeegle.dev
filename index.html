      --idearoom: #e37748;

      font-family: "Hack", sans-serif;

    a {
      padding: 10px;
      color: var(--accent-color);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
      background-color: rgba(255, 255, 255, 0.4);
    }
